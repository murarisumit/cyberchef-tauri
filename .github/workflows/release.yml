name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos-release:
    runs-on: macos-latest
    env:
      CYBERCHEF_SKIP_NVM: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: vendor/cyberchef/.nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            vendor/cyberchef/package-lock.json

      - name: Capture Node Version
        id: node_info
        run: echo "version=$(node -v)" >> "$GITHUB_OUTPUT"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Wrapper Dependencies
        run: npm ci

      - name: Install Vendored CyberChef Dependencies
        id: prepare
        run: npm run prepare:cyberchef

      - name: Read Release Metadata
        id: meta
        run: node ./scripts/release-metadata.mjs --github-output

      - name: Validate Release Metadata
        id: release_check
        env:
          RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
        run: npm run release:check

      - name: Build Desktop App
        id: build
        run: npm run tauri build

      - name: Collect DMG Artifact
        id: collect_artifact
        run: |
          dmg_path="$(find src-tauri/target/release/bundle/dmg -maxdepth 1 -name '*.dmg' -print -quit)"
          test -n "$dmg_path"
          cp "$dmg_path" CyberChef-${{ steps.meta.outputs.release_tag }}-macos.dmg

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CyberChef-${{ steps.meta.outputs.release_tag }}-macos
          path: CyberChef-${{ steps.meta.outputs.release_tag }}-macos.dmg
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.meta.outputs.release_name }}
          tag_name: ${{ github.ref_name }}
          files: CyberChef-${{ steps.meta.outputs.release_tag }}-macos.dmg
          generate_release_notes: true
          body: |
            App version: `${{ steps.meta.outputs.app_version }}`
            Vendored CyberChef version: `${{ steps.meta.outputs.cyberchef_version }}`
            Vendored CyberChef commit: `${{ steps.meta.outputs.vendor_commit }}`

      - name: Write Job Summary
        if: always()
        run: |
          {
            echo "## Release Summary"
            echo
            echo "- Node: \`${{ steps.node_info.outputs.version }}\`"
            echo "- App version: \`${{ steps.meta.outputs.app_version }}\`"
            echo "- CyberChef version: \`${{ steps.meta.outputs.cyberchef_version }}\`"
            echo "- Release tag: \`${{ steps.meta.outputs.release_tag }}\`"
            echo "- Vendored commit: \`${{ steps.meta.outputs.vendor_commit }}\`"
            echo "- Prepare vendored dependencies: \`${{ steps.prepare.conclusion }}\`"
            echo "- Release metadata check: \`${{ steps.release_check.conclusion }}\`"
            echo "- Desktop build: \`${{ steps.build.conclusion }}\`"
            echo "- Artifact collection: \`${{ steps.collect_artifact.conclusion }}\`"
            echo "- Job result: \`${{ job.status }}\`"
            if [ "${{ steps.collect_artifact.conclusion }}" = "success" ]; then
              echo "- Artifact: \`CyberChef-${{ steps.meta.outputs.release_tag }}-macos.dmg\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
