[package]
name = "CyberChef"
version = "10.23.0"
description = "CyberChef desktop app"
authors = ["GCHQ"]
license = "Apache-2.0"
repository = "https://github.com/gchq/CyberChef"
default-run = "CyberChef"
edition = "2021"
rust-version = "1.59"

[build-dependencies]
tauri-build = { version = "1.2.1", features = [] }

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tauri = { version = "1.2.2", features = [] }

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]
